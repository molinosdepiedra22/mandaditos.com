<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'pedidos/css/styles.css' %}">
</head>
<body>
    <h1>{{ titulo }}</h1>

    <p>¿Estás completamente seguro de que deseas eliminar a <strong>{{ objeto }}</strong>?</p>
    <p>Esta acción no se puede deshacer.</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn-eliminar">Sí, eliminar</button>
        <a href="javascript:history.back()">Cancelar y volver</a>
    </form>
</body>
</html>
