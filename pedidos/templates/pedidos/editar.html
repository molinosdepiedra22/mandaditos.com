<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'pedidos/css/styles.css' %}">
</head>
<body>
    <h1>{{ titulo }}</h1>

    <div class="objeto-info">
        Editando: <strong>{{ objeto }}</strong>
    </div>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <small style="color:red;">{{ field.errors }}</small>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn">Guardar cambios</button>
        <button type="button" class="btn-cancelar" onclick="history.back()">Cancelar</button>
    </form>
</body>
</html>
