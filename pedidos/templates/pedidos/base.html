<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block titulo %}mandaditos.com{% endblock %}</title>

    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'pedidos/css/styles.css' %}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">

            <a class="navbar-brand fw-bold" href="{% url 'home' %}">
                🚚 Mandaditos
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_clientes' %}">Clientes</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_restaurantes' %}">Restaurantes</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_repartidores' %}">Repartidores</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_pedidos' %}">Pedidos</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <div class="container mt-4">
        {% block contenido %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
